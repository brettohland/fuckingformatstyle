name: Deploy Sites

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Configure git to use HTTPS for GitHub
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: true
          fetch-depth: 0

      - name: Update changelog
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_DATE: ${{ github.event.release.published_at }}
        run: |
          # Format the date as YYYY-MM-DD
          DATE=$(echo "$RELEASE_DATE" | cut -c1-10)

          # Write the new changelog entry to a temp file
          ENTRY_FILE=$(mktemp)
          printf '\n## [%s](%s) (%s)\n\n%s\n' "$TAG_NAME" "$RELEASE_URL" "$DATE" "$RELEASE_BODY" > "$ENTRY_FILE"

          # Insert the entry after the frontmatter (after the second ---)
          awk -v entry_file="$ENTRY_FILE" '
            BEGIN { frontmatter_count = 0; inserted = 0 }
            /^---$/ {
              frontmatter_count++
              print
              if (frontmatter_count == 2 && !inserted) {
                while ((getline line < entry_file) > 0) print line
                close(entry_file)
                inserted = 1
              }
              next
            }
            { print }
          ' content/changelog.md > content/changelog.md.tmp
          mv content/changelog.md.tmp content/changelog.md
          rm -f "$ENTRY_FILE"

          echo "Changelog updated with ${TAG_NAME}"

      - name: Commit and push changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/changelog.md
          git commit -m "Update changelog for ${TAG_NAME}"
          git push origin main
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build theme assets
        run: |
          cd themes/hugo-geekdoc
          npm ci
          npm run build

      - name: Install Hugo
        env:
          HUGO_VERSION: "0.152.2"
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_darwin-universal.tar.gz" -O hugo.tar.gz
          tar -xzf hugo.tar.gz hugo
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Cache SplashHTMLGen
        id: cache-splash
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/SplashHTMLGen
          key: splashhtmlgen-${{ hashFiles('.github/workflows/deploy.yml') }}

      - name: Build SplashHTMLGen
        if: steps.cache-splash.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/JohnSundell/Splash.git /tmp/Splash
          cd /tmp/Splash
          swift build -c release
          cp $(swift build -c release --show-bin-path)/SplashHTMLGen /usr/local/bin/SplashHTMLGen

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add DreamHost to known hosts
        run: ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy fuckingformatstyle.com
        run: |
          hugo
          rm -rf public/_includes
          ./markup.sh public
          rsync -avz --delete public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/${{ secrets.DEPLOY_FCK_PATH }}

      - name: Build and deploy goshdarnformatstyle.com
        run: |
          hugo --config config-gosh.toml
          rm -rf public/_includes
          ./markup.sh public
          rsync -avz --delete public/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:~/${{ secrets.DEPLOY_GOSH_PATH }}
